repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix]
        exclude: ^docs/
      - id: ruff-format
        exclude: ^docs/

  - repo: local
    hooks:
      - id: ty
        name: ty type check
        entry: uv run ty check src/ tests/ API.py
        language: system
        types: [python]
        pass_filenames: false

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.9
    hooks:
      - id: commitizen
